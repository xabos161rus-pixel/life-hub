name: Setup TURN

# Одноразовая настройка звонков: прописывает TURN-ключ Cloudflare Realtime
# секретами воркера (TURN_KEY_ID / TURN_KEY_API_TOKEN). Два пути:
#   1) Если в GitHub Secrets заданы TURN_KEY_ID и TURN_KEY_API_TOKEN
#      (ключ создан руками в dash → Realtime → TURN) — просто переносим их
#      в секреты воркера. Прав токена достаточно «Edit Workers».
#   2) Иначе пытаемся создать ключ через Realtime API — требует права
#      Calls/Realtime: Edit у CLOUDFLARE_API_TOKEN.
# Значения маскируются и в логи не попадают. Повторный запуск безопасен.

on:
  workflow_dispatch:

jobs:
  setup-turn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: worker
      - name: Set worker secrets from GitHub secrets (if provided)
        id: direct
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TURN_ID: ${{ secrets.TURN_KEY_ID }}
          TURN_KEY: ${{ secrets.TURN_KEY_API_TOKEN }}
          METERED_DOMAIN: ${{ secrets.METERED_DOMAIN }}
          METERED_API_KEY: ${{ secrets.METERED_API_KEY }}
        run: |
          set -euo pipefail
          DONE=false
          if [ -n "${TURN_ID}" ] && [ -n "${TURN_KEY}" ]; then
            printf '%s' "$TURN_ID" | npx wrangler secret put TURN_KEY_ID
            printf '%s' "$TURN_KEY" | npx wrangler secret put TURN_KEY_API_TOKEN
            DONE=true
            echo "Секреты Cloudflare TURN установлены."
          fi
          if [ -n "${METERED_DOMAIN}" ] && [ -n "${METERED_API_KEY}" ]; then
            printf '%s' "$METERED_DOMAIN" | npx wrangler secret put METERED_DOMAIN
            printf '%s' "$METERED_API_KEY" | npx wrangler secret put METERED_API_KEY
            DONE=true
            echo "Секреты Metered TURN установлены."
          fi
          echo "done=$DONE" >> "$GITHUB_OUTPUT"
          if [ "$DONE" = "false" ]; then
            echo "Секреты TURN в GitHub не заданы — пробуем создать ключ через Cloudflare API."
          fi
      - name: Create TURN key via API and set worker secrets
        if: steps.direct.outputs.done != 'true'
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/calls/turn_keys" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"name":"life-hub"}')
          node - "$RESP" <<'EOF'
          const j = JSON.parse(process.argv[2]);
          if (!j.success) {
            console.error('Cloudflare API отказал (создание TURN-ключа):');
            console.error(JSON.stringify(j.errors ?? j.messages ?? {}, null, 2));
            process.exit(1);
          }
          const r = j.result || {};
          const id = r.uid ?? r.id ?? '';
          const key = r.key ?? r.secret ?? r.api_token ?? '';
          if (!id || !key) {
            console.error('Неожиданный формат ответа; поля result:', Object.keys(r).join(', '));
            process.exit(1);
          }
          const fs = require('fs');
          fs.writeFileSync('turn_id.txt', id);
          fs.writeFileSync('turn_key.txt', key);
          EOF
          TURN_ID=$(cat turn_id.txt); TURN_KEY=$(cat turn_key.txt); rm -f turn_id.txt turn_key.txt
          echo "::add-mask::$TURN_ID"
          echo "::add-mask::$TURN_KEY"
          printf '%s' "$TURN_ID" | npx wrangler secret put TURN_KEY_ID
          printf '%s' "$TURN_KEY" | npx wrangler secret put TURN_KEY_API_TOKEN
          echo "Готово: TURN-ключ создан, секреты воркера установлены."
