name: Setup TURN

# Одноразовая настройка звонков: создаёт TURN-ключ в Cloudflare Realtime и
# прописывает его секретами воркера (TURN_KEY_ID / TURN_KEY_API_TOKEN).
# Значения маскируются и в логи не попадают. Требования:
#   - подписка Realtime активирована (dash → Realtime);
#   - у CLOUDFLARE_API_TOKEN есть право Calls/Realtime: Edit (если нет —
#     шаг создания ключа вернёт ошибку авторизации, см. лог).
# Повторный запуск безопасен: создаётся ещё один ключ, секреты перезаписываются.

on:
  workflow_dispatch:

jobs:
  setup-turn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: worker
      - name: Create TURN key and set worker secrets
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/calls/turn_keys" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"name":"life-hub"}')
          node - "$RESP" <<'EOF'
          const j = JSON.parse(process.argv[2]);
          if (!j.success) {
            console.error('Cloudflare API отказал (создание TURN-ключа):');
            console.error(JSON.stringify(j.errors ?? j.messages ?? {}, null, 2));
            process.exit(1);
          }
          const r = j.result || {};
          const id = r.uid ?? r.id ?? '';
          const key = r.key ?? r.secret ?? r.api_token ?? '';
          if (!id || !key) {
            console.error('Неожиданный формат ответа; поля result:', Object.keys(r).join(', '));
            process.exit(1);
          }
          const fs = require('fs');
          fs.writeFileSync('turn_id.txt', id);
          fs.writeFileSync('turn_key.txt', key);
          EOF
          TURN_ID=$(cat turn_id.txt); TURN_KEY=$(cat turn_key.txt); rm -f turn_id.txt turn_key.txt
          echo "::add-mask::$TURN_ID"
          echo "::add-mask::$TURN_KEY"
          printf '%s' "$TURN_ID" | npx wrangler secret put TURN_KEY_ID
          printf '%s' "$TURN_KEY" | npx wrangler secret put TURN_KEY_API_TOKEN
          echo "Готово: TURN-ключ создан, секреты воркера установлены."
