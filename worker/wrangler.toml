name = "life-hub-push"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Публичные переменные (не секреты).
[vars]
ALLOW_ORIGIN = "https://xabos161rus-pixel.github.io"
VAPID_PUBLIC = "BCi0yalmrjjC4elVs1vwAzGASoESrlpDA5ImcuB-u6kOVQf00Zc-GIK79WIBe7sQp5Y3_IBD96l8JEpccCj9Ws8"
VAPID_SUBJECT = "mailto:xabos161rus@gmail.com"

# KV для напоминаний. id подставляется после `wrangler kv namespace create REMINDERS`.
[[kv_namespaces]]
binding = "REMINDERS"
id = "f0580b633e4b4d1bb5adff01aa122b92"

# D1 для E2E-синхронизации (Фаза 1). На сервере — только шифротекст + служебные
# поля (id/updatedAt/deletedAt). database_id подставляется после
# `wrangler d1 create life-hub-sync`. Миграции лежат в ./migrations.
[[d1_databases]]
binding = "DB"
database_name = "life-hub-sync"
database_id = "c263d0c7-0ca0-4275-b0e5-6286b2f95695"

# Durable Object для семейного раздела (чат + общие задачи). SQLite-backed —
# доступен на Workers Free. Источник истины с монотонным seq.
[[durable_objects.bindings]]
name = "FAMILY_ROOM"
class_name = "FamilyRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FamilyRoom"]

# Планировщик: раз в минуту проверяем и шлём наступившие напоминания.
[triggers]
crons = ["* * * * *"]

# Секрет VAPID_PRIVATE задаётся через `wrangler secret put VAPID_PRIVATE` (не в файле).
#
# Аудиозвонки (WebRTC). STUN бесплатен и работает «из коробки». TURN-relay нужен
# для ~10–20% сетей за симметричным NAT — Cloudflare Realtime даёт 1000 ГБ/мес
# бесплатно. Чтобы включить TURN, создай TURN-ключ в дашборде Cloudflare
# (Realtime → TURN) и задай два секрета:
#   wrangler secret put TURN_KEY_ID
#   wrangler secret put TURN_KEY_API_TOKEN
# Без них звонки всё равно работают (STUN-only), просто без relay-фолбэка.
