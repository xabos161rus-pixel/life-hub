<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1d1d27" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black, НЕ black-translucent: при translucent iOS standalone сдвигает
         вьюпорт для position:fixed вверх на высоту статус-бара, из-за чего каркас
         fixed inset-0 не достаёт до низа экрана (полоса под таб-баром). С black
         контент-область считается корректно и панель доходит до нижнего края. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="LifeHearth" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
    <title>LifeHearth</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
